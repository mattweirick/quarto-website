- id: johnsonTrainingLibraryInstructors2024
  abstract: >-
    "Pedagogy impacts all parts of library work and culture. It changes the way
    we interact with learners regardless of setting and however we name or
    define the teaching moment, from research help to outreach to leading
    meetings. Pedagogy is a praxis of relation, and studying it can improve all
    aspects of our work and organizations. In two volumes, Training Library
    Instructors collects examples of how we train our colleagues to teach,
    whether they're student workers, non-librarian staff, new or experienced
    librarians, or something else entirely. Volume 1, A Guide to Training
    Graduate Students, focuses on teacher training for graduate students in LIS
    programs and in academic libraries. It presents existing literature and
    theories, approaches to teaching library school students to teach, and
    critical reflections from librarians about their varied experiences
    receiving teacher training. In Volume 2, A Guide to Training Librarians,
    librarians share their knowledge about teaching, learning, and pedagogy
    through a variety of replicable activities: formal and informal workshops,
    courses, communities of practice, peer observation, and more. Training
    Library Instructors provides detailed, easily implemented and modified plans
    for courses, internships, teach-the-teacher programs, and other
    instructional methods and opportunities for graduate students and library
    workers at all levels of teaching experience"--
