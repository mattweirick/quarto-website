- id: johnsonJobControlIts2023
  abstract: >-
    Librarians have been grappling with the issue of burnout for decades, at
    least. This study uses the Copenhagen Burnout Inventory (CBI) and Job
    Control Inventory to show how job control impacts burnout. Using the CBI,
    academic instruction librarians, on average, have high work-related burnout
    and even higher personal burnout compared to other jobs. However, librarians
    have low client-related burnout, similar to other “caring” or “helping”
    professions. The findings point to key factors that impact job control and
    burnout to help consider ways of mitigating burnout and increasing job
    control.
